# 口袋地球 nginx 反代基础块（放 /etc/nginx/conf.d/）。
# 先以 80 端口跑通，再用 certbot --nginx -d <域名> 自动改写成 443 + 80→443 跳转。
server {
    server_name pocket-earth.throughtheglass.art;   # 改成你的域名

    # 端侧视觉打分等接口可能上传 base64 图片，放宽请求体上限
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3008;           # 与 .env 的 API_PORT 一致
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;                     # 云脑长回答留足时间
    }

    listen 80;
}
